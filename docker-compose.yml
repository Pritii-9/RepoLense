services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: repolens-frontend
    ports:
      - "4173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repolens-backend
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
    command: >
      sh -c "sleep 5 && alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: repolens-postgres
    environment:
      POSTGRES_DB: repolens
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens -d repolens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

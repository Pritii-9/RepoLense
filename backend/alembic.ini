[alembic]
 script_location = alembic
prepend_sys_path = .
 # Use the DATABASE_URL environment variable if set, otherwise fall back
 # to a default local connection. Docker Compose sets DATABASE_URL to point
 # to the postgres service.
 sqlalchemy.url = ${DATABASE_URL:-postgresql+asyncpg://repolens:repolens@localhost:5432/repolens}

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
